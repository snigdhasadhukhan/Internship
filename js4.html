<body>
    <script>
        var arr=[70,15,50,68,75];
        var min=arr[0], sum=arr[0];
        for(var i=1;i<5;i++)
    {
        if(min>arr[i])
        min=arr[i];
        sum+=arr[i];
    }
    document.write("Sum: "+sum+"<br>Minimum element: "+min);
    </script>
